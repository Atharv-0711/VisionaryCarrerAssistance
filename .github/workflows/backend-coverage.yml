name: Backend Coverage

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-coverage.yml"
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-coverage.yml"

jobs:
  test-and-coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-ci.txt

      - name: Run ingestion and analytics tests with coverage
        run: |
          pytest backend/tests \
            --cov=backend/app.py \
            --cov-report=term-missing \
            --cov-report=xml:backend/coverage.xml

      - name: Publish coverage XML artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: backend/coverage.xml

      - name: Append coverage report summary
        run: |
          python - <<'PY'
          import os
          import xml.etree.ElementTree as ET
          tree = ET.parse("backend/coverage.xml")
          root = tree.getroot()
          line_rate = float(root.attrib.get("line-rate", 0.0)) * 100
          summary_path = os.environ["GITHUB_STEP_SUMMARY"]
          with open(summary_path, "a", encoding="utf-8") as fh:
            fh.write("## Backend Coverage\n")
            fh.write(f"- Line coverage: **{line_rate:.2f}%**\n")
            fh.write("- Scope: ingestion and analytics API paths\n")
          PY
